services:
  - type: web
    name: jamsc
    env: node
    buildCommand: npm install && cd ../client && npm install --include=dev && npm run build
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        value: https://jamsc.onrender.com
